<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>首页四宫格配置 - 联信装机管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 24px; }
        .slots-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .slot-item { border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; transition: all 0.3s; }
        .slot-item:hover { border-color: #667eea; }
        .slot-preview { width: 100%; height: 120px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; }
        .slot-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .slot-preview i { font-size: 48px; color: #ccc; }
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 500; font-size: 14px; }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .btn-secondary { background: #6c757d; color: white; }
        .file-input { display: none; }
        .btn-file { display: inline-block; padding: 8px 16px; background: #e9ecef; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-file:hover { background: #dee2e6; }
        .message { padding: 10px; border-radius: 6px; margin-bottom: 15px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-th-large"></i> 首页四宫格配置</h1>
    </div>
    <div class="container">
        <div class="card">
            <div id="message"></div>
            <div class="slots-grid" id="slotsGrid"></div>
            <div style="margin-top: 20px; text-align: center;">
                <button class="btn btn-primary" onclick="saveAll()"><i class="fas fa-save"></i> 保存全部</button>
                <button class="btn btn-secondary" onclick="window.location.href='gluidcadmin'"><i class="fas fa-arrow-left"></i> 返回后台</button>
            </div>
        </div>
    </div>

    <script>
    function adminAuthHeaders(isJson) {
        const h = isJson ? { 'Content-Type': 'application/json' } : {};
        const t = sessionStorage.getItem('adminPanelToken');
        if (t) h['Authorization'] = 'Bearer ' + t;
        return h;
    }

    const slotsData = [1, 2, 3, 4];
    let slots = {};
    
    // 加载配置
    async function loadSlots() {
        try {
            const res = await fetch('/api/home-slots', { headers: adminAuthHeaders() });
            const data = await res.json();
            if (data.success) {
                data.data.forEach(s => { slots[s.slot] = s; });
                renderSlots();
            }
        } catch(e) { showMessage('加载失败: ' + e.message, 'error'); }
    }
    
    function renderSlots() {
        const grid = document.getElementById('slotsGrid');
        grid.innerHTML = '';
        slotsData.forEach(i => {
            const s = slots[i] || { slot: i, title: '', imageUrl: '', alt: '', link: '', tooltip: '' };
            const previewImg = s.imageUrl ? `<img src="${s.imageUrl}" alt="${s.alt}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-image\\'></i>'">` : '<i class="fas fa-image"></i>';
            grid.innerHTML += `
                <div class="slot-item">
                    <div class="slot-preview" id="preview${i}">${previewImg}</div>
                    <div class="form-group">
                        <label>槽位 ${i} - 标题</label>
                        <input type="text" id="title${i}" value="${s.title || ''}" placeholder="如：CPU处理器">
                    </div>
                    <div class="form-group">
                        <label>Tooltip 提示</label>
                        <input type="text" id="tooltip${i}" value="${s.tooltip || ''}" placeholder="鼠标悬停显示">
                    </div>
                    <div class="form-group">
                        <label>Alt 描述</label>
                        <input type="text" id="alt${i}" value="${s.alt || ''}" placeholder="图片无法加载时显示">
                    </div>
                    <div class="form-group">
                        <label>跳转链接</label>
                        <input type="text" id="link${i}" value="${s.link || ''}" placeholder="点击跳转地址">
                    </div>
                    <div class="form-group">
                        <label>上传图片</label>
                        <input type="file" id="file${i}" class="file-input" accept="image/*" onchange="handleFile(${i}, this.files[0])">
                        <label for="file${i}" class="btn-file"><i class="fas fa-upload"></i> 选择图片</label>
                        <span id="fileName${i}"></span>
                    </div>
                </div>
            `;
        });
    }
    
    async function handleFile(slot, file) {
        if (!file) return;
        document.getElementById('fileName' + slot).textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64 = e.target.result;
            try {
                const res = await fetch('/api/home-slots/upload', {
                    method: 'POST',
                    headers: adminAuthHeaders(true),
                    body: JSON.stringify({ image: base64, filename: file.name, slot: slot })
                });
                const data = await res.json();
                if (data.success) {
                    slots[slot].imageUrl = data.imageUrl;
                    document.getElementById('preview' + slot).innerHTML = `<img src="${data.imageUrl}" alt="">`;
                    showMessage('图片上传成功', 'success');
                } else {
                    showMessage('上传失败: ' + data.message, 'error');
                }
            } catch(e) { showMessage('上传失败: ' + e.message, 'error'); }
        };
        reader.readAsDataURL(file);
    }
    
    async function saveAll() {
        try {
            for (let i = 1; i <= 4; i++) {
                const title = document.getElementById('title' + i).value;
                const tooltip = document.getElementById('tooltip' + i).value;
                const alt = document.getElementById('alt' + i).value;
                const link = document.getElementById('link' + i).value;
                const imageUrl = slots[i]?.imageUrl || '';
                
                await fetch('/api/home-slots/' + i, {
                    method: 'PUT',
                    headers: adminAuthHeaders(true),
                    body: JSON.stringify({ title, tooltip, alt, link, imageUrl })
                });
            }
            showMessage('保存成功', 'success');
        } catch(e) { showMessage('保存失败: ' + e.message, 'error'); }
    }
    
    function showMessage(msg, type) {
        const el = document.getElementById('message');
        el.textContent = msg;
        el.className = 'message ' + type;
        setTimeout(() => el.className = 'message', 3000);
    }
    
    loadSlots();
    </script>
</body>
</html>
