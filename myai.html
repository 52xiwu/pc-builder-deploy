<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>装机顾问 AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
:root {
  --bg-void:    #060616;
  --bg-deep:    #0c0820;
  --bg-mid:     #12082e;
  --bg-surface: rgba(18, 10, 40, 0.55);
  --bg-card:    rgba(16, 10, 38, 0.60);
  --bg-glass:   rgba(14, 8, 34, 0.50);
  --border:     rgba(0, 229, 255, 0.10);
  --border-hover: rgba(0, 229, 255, 0.28);
  --text-primary:   #f0e6ff;
  --text-secondary: #a89cc8;
  --text-muted:     #6b6180;
  --cyan:       #00e5ff;
  --cyan-dim:   rgba(0, 229, 255, 0.14);
  --cyan-glow:  rgba(0, 229, 255, 0.35);
  --cyan-deep:  rgba(0, 229, 255, 0.07);
  --purple:     #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.15);
  --purple-glow:rgba(167, 139, 250, 0.30);
  --shadow-card: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-glow: 0 0 24px rgba(0, 229, 255, 0.12);
  --radius-lg:  20px;
  --radius-md:  14px;
  --radius-sm:  10px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  height: 100vh;
  font-family: var(--font);
  background: var(--bg-void);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,255,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(167,139,250,0.06) 0%, transparent 60%);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── 顶栏 ── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 58px;
  background: rgba(12, 8, 32, 0.7);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ai-logo-icon {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  border: 1.5px solid rgba(0,229,255,0.3);
  overflow: hidden;
  background: radial-gradient(circle at 35% 30%, #1a3a5a, #060c20);
  box-shadow: 0 0 16px rgba(0,229,255,0.18), 0 0 32px rgba(0,229,255,0.06) inset;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5px;
}

.ai-logo-icon svg {
  width: 100%;
  height: 100%;
  display: block;
}

.topbar-info .app-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.01em;
}
.topbar-info .app-sub {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.pro-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 1px 5px 2px;
  border-radius: 4px;
  background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(167,139,250,0.18));
  border: 1px solid rgba(0,229,255,0.35);
  color: #e8ffff;
  box-shadow: 0 0 10px rgba(0,229,255,0.15);
  font-family: var(--font-mono);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--cyan);
  box-shadow: 0 0 8px var(--cyan);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.status-text {
  font-size: 12px;
  font-weight: 500;
  color: var(--cyan);
  font-family: var(--font-mono);
}

/* ── 两侧装饰 ── */
.deco-left,
.deco-right {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  pointer-events: none;
  opacity: 0.6;
  z-index: 0;
}
.deco-left  { left: 16px; }
.deco-right { right: 16px; }
.deco-left svg,
.deco-right svg { width: 100%; height: auto; display: block; }

/* ── 主内容 ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0 32px;
  width: 100%;
  min-height: 0;
}

#welcomePage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 20px;
  padding: 20px max(24px, 12vh);
  overflow: hidden;
}

.welcome-icon {
  width: 80px;
  height: 80px;
  border-radius: 16px;
  border: 1.5px solid rgba(0,229,255,0.3);
  overflow: hidden;
  background: radial-gradient(circle at 35% 30%, #1a3a5a, #060c20);
  box-shadow: 0 0 32px rgba(0,229,255,0.2), 0 0 64px rgba(0,229,255,0.06) inset;
}
.welcome-icon svg { display: block; width: 100%; height: 100%; }

/* ── Hero 品牌区 ── */
.welcome-brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.wb-icon {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  border: 1.5px solid rgba(0, 229, 255, 0.35);
  overflow: hidden;
  background: radial-gradient(circle at 35% 30%, #1a3a5a, #060c20);
  box-shadow:
    0 0 0 1px rgba(0, 229, 255, 0.12) inset,
    0 0 40px rgba(0, 229, 255, 0.25),
    0 0 80px rgba(0, 229, 255, 0.08) inset,
    0 12px 32px rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
}
.wb-icon svg {
  width: 100%;
  height: 100%;
  display: block;
  filter: drop-shadow(0 0 8px rgba(0, 245, 255, 0.4));
}

.wb-text {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.wb-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(180, 240, 255, 0.88);
  text-shadow: 0 0 20px rgba(0, 229, 255, 0.45);
  font-family: var(--font-mono);
}

.wb-sub {
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.wb-sub .pro-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.12em;
  padding: 1px 5px 2px;
  border-radius: 4px;
  background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(167,139,250,0.18));
  border: 1px solid rgba(0,229,255,0.35);
  color: #e8ffff;
  box-shadow: 0 0 10px rgba(0,229,255,0.15);
  font-family: var(--font-mono);
}

#welcomePage h2 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -0.01em;
}

#welcomePage p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 480px;
}

/* 快捷提示 — 换行方案 */
.quick-prompts {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 10px;
  justify-content: center;
  align-content: center;
  width: min(920px, 100%);
  margin: 0 auto;
  padding: 4px max(16px, 4vw);
  box-sizing: border-box;
}
.quick-prompts::-webkit-scrollbar { display: none; }
.qp-btn {
  flex-shrink: 0;
  padding: 9px 18px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-glass);
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  white-space: nowrap;
  transition: border-color 0.2s, background 0.2s, color 0.2s, box-shadow 0.2s;
}
.qp-btn:hover {
  border-color: var(--cyan);
  background: var(--cyan-dim);
  color: var(--cyan);
  box-shadow: 0 0 16px rgba(0,229,255,0.15);
}

/* ── 聊天区 ── */
#chatArea {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 12px 0 calc(max(24px, 12vh) + 88px);
  scroll-behavior: smooth;
  min-height: 0;
  /* 与 .input-wrap (920px centered) 对齐 */
  max-width: min(920px, 100%);
  margin: 0 auto;
  width: 100%;
}

.msg-row {
  display: flex;
  flex-direction: column;
  max-width: min(920px, 100%);
  margin: 0 auto;
}
.msg-row.user { align-items: flex-end; }
.msg-row.ai   { align-items: flex-start; }

.msg-bubble {
  position: relative;
  padding: 12px 16px;
  border-radius: var(--radius-md);
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.user .msg-bubble {
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #060616;
  font-weight: 600;
  border-bottom-right-radius: 4px;
  box-shadow: 0 4px 20px rgba(0,229,255,0.25);
}
.user .msg-bubble::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
  pointer-events: none;
}
.ai .msg-bubble {
  background: rgba(20, 14, 50, 0.85);
  border: 1px solid rgba(0, 229, 255, 0.20);
  border-bottom: 1px solid rgba(0, 229, 255, 0.30);
  color: #e0d8ff;
  border-bottom-left-radius: 4px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.ai-logo {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  margin-top: 1px;
}
.ai-logo svg {
  width: 100%;
  height: 100%;
  display: block;
}
.ai-text {
  flex: 1;
  min-width: 0;
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 5px;
  padding: 0 4px;
  font-family: var(--font-mono);
}

/* typing */
.typing-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  box-shadow: var(--shadow-card);
}
.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--cyan);
  animation: blink 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50%       { opacity: 1;   transform: scale(1); }
}

/* ── 输入区 ── */
.input-wrap {
  position: fixed;
  bottom: max(24px, 12vh);
  left: 50%;
  transform: translateX(-50%);
  width: min(920px, 94vw);
  z-index: 100;
}

.input-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(14, 8, 34, 0.8);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(0, 229, 255, 0.2);
  border-radius: 18px;
  padding: 10px 16px;
  box-shadow:
    0 0 0 1px rgba(0, 229, 255, 0.06) inset,
    0 12px 48px rgba(0, 0, 0, 0.55),
    0 0 32px rgba(0, 229, 255, 0.1);
}

.msg-input {
  flex: 1;
  min-width: 0;
  min-height: 52px;
  max-height: 120px;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid rgba(0, 229, 255, 0.12);
  background: rgba(6, 6, 22, 0.7);
  color: var(--text-primary);
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  resize: none;
  line-height: 1.5;
  transition: border-color 0.2s, box-shadow 0.2s;
  overflow-y: auto;
}
.msg-input::placeholder { color: var(--text-muted); }
.msg-input:focus {
  border-color: rgba(0, 229, 255, 0.4);
  box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.08), 0 0 16px rgba(0, 229, 255, 0.1);
}

.btn-send {
  flex-shrink: 0;
  height: 52px;
  padding: 0 28px;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  font-size: 15px;
  font-family: var(--font);
  cursor: pointer;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #060616;
  box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
  transition: filter 0.2s, box-shadow 0.2s;
  white-space: nowrap;
}
.btn-send:hover {
  filter: brightness(1.1);
  box-shadow: 0 4px 28px rgba(0, 229, 255, 0.45);
}
.btn-send:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }

/* ── 滚动条 ── */
#chatArea::-webkit-scrollbar { width: 4px; }
#chatArea::-webkit-scrollbar-track { background: transparent; }
#chatArea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 640px) {
  .main { padding: 0 14px; }
  .msg-row { max-width: 88%; }
  .topbar { padding: 0 14px; }
  .input-wrap {
    bottom: max(16px, env(safe-area-inset-bottom, 12px));
    width: min(94vw, 100%);
    left: 50%;
    transform: translateX(-50%);
  }
  #welcomePage {
    padding: 20px max(16px, env(safe-area-inset-bottom, 12px));
  }
  #chatArea {
    padding: 12px 0 calc(max(16px, env(safe-area-inset-bottom, 12px)) + 80px);
  }
}
  </style>
</head>
<body>

<!-- 顶栏 -->
<header class="topbar">
  <div class="topbar-left">
    <div class="ai-logo-icon">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="myAIhdrLG" x1="0%" y1="0%" x2="100%" y2="100%">

            <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>

            <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>

        <rect x="3" y="5" width="34" height="23" rx="5.5" fill="url(#myAIhdrBG)" stroke="url(#myAIhdrLG)" stroke-width="1.45"/>
        <rect x="7" y="9" width="26" height="13" rx="2.2" fill="#030810" stroke="rgba(0,229,255,0.14)" stroke-width="0.6"/>
        <rect x="9" y="11" width="10" height="2.4" rx="1.2" fill="url(#myAIhdrLG)"/>

    <span class="status-dot"></span>

  </div>
</header>

<!-- 两侧装饰：PC硬件图标 -->

    <rect x="18" y="18" width="24" height="24" rx="2" fill="rgba(0,229,255,0.06)" stroke="rgba(0,229,255,0.3)" stroke-width="1"/>

</div>

<div class="deco-right" aria-hidden="true">
  <svg viewBox="0 0 60 120" xmlns="http://www.w3.org/2000/svg">
    <!-- Motherboard trace pattern -->
    <rect x="10" y="10" width="40" height="40" rx="4" fill="none" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>

<script>
(function () {
  const TAU = Math.PI * 2;

  // ── 头像动画 ─────────────────────────────────────────────
  function drawSphere(cv) {
    const ctx = cv.getContext('2d');
    const w = cv.width, h = cv.height, cx = w / 2, cy = h / 2;
    const t = Date.now() * 0.002;
    ctx.clearRect(0, 0, w, h);

    // 主体球
    const grd = ctx.createRadialGradient(cx - 4, cy - 6, 2, cx, cy, 18);
    grd.addColorStop(0,   '#b0f4ff');
    grd.addColorStop(0.4, '#00d4f0');
    grd.addColorStop(1,   '#060c20');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(cx, cy, 18, 0, TAU);
    ctx.fill();

    // 紫色光点轨道
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * TAU + t * 0.7;
      const r = 12 + Math.sin(i * 1.6 + t) * 2;
      const alpha = 0.2 + (i % 4) * 0.1;
      ctx.fillStyle = `rgba(167, 139, 250, ${alpha})`;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r * 0.9, cy + Math.sin(a) * r * 0.75, 1.1, 0, TAU);
      ctx.fill();
    }

    // 青色高光
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * TAU - t * 0.4;
      const r = 15 + Math.sin(i * 2.1 + t) * 2;
      ctx.fillStyle = `rgba(0, 229, 255, 0.25)`;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * r * 0.85, cy + Math.sin(a) * r * 0.7, 0.9, 0, TAU);
      ctx.fill();
    }
  }

  function loopSpheres() {
    drawSphere(document.getElementById('sphereCv'));
    drawSphere(document.getElementById('sphereCv2'));
    requestAnimationFrame(loopSpheres);
  }

  // ── 聊天逻辑 ──────────────────────────────────────────────
  const chatArea = document.getElementById('chatArea');
  const msgInput = document.getElementById('msgInput');
  const btnSend  = document.getElementById('btnSend');
  let sessionMsgs = [];

  function scrollChat() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatTime() {
    const now = new Date();
    return [now.getHours(), now.getMinutes()].map(v => String(v).padStart(2,'0')).join(':');
  }

  function addBubble(role, text, timeStr) {
    const logoSvg = `<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="lxAI" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7dffff"/>
          <stop offset="45%" stop-color="#00c8ea"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
        <linearGradient id="lxAI2" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#152238"/>
          <stop offset="1" stop-color="#060b14"/>
        </linearGradient>
        <linearGradient id="lxAI3" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#00f5ff" stop-opacity="0"/>
          <stop offset="50%" stop-color="#00f5ff" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="#00f5ff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <rect x="3" y="5" width="34" height="23" rx="5.5" fill="url(#lxAI2)" stroke="url(#lxAI)" stroke-width="1.45"/>
      <rect x="7" y="9" width="26" height="13" rx="2.2" fill="#030810" stroke="rgba(0,229,255,0.14)" stroke-width="0.6"/>
      <rect x="9" y="11" width="10" height="2.4" rx="1.2" fill="url(#lxAI)"/>
      <rect x="9" y="15.4" width="17" height="2.4" rx="1.2" fill="url(#lxAI)" opacity="0.5"/>
      <rect x="9" y="19.8" width="12" height="1.7" rx="0.85" fill="url(#lxAI)" opacity="0.32"/>
      <rect x="7" y="9" width="26" height="6" rx="2.2" fill="url(#lxAI3)"/>
      <path d="M15 28.5h10l-1.4 4.8h-7.2z" fill="url(#lxAI)"/>
      <ellipse cx="20" cy="34.2" rx="9" ry="1.4" fill="#00e5ff" opacity="0.25"/>
    </svg>`;

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    if (role === 'ai') {
      row.innerHTML = `<div class="msg-bubble"><div class="ai-logo">${logoSvg}</div><div class="ai-text">${escapeHtml(text)}</div></div><div class="msg-time">${timeStr}</div>`;
    } else {
      row.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${timeStr}</div>`;
    }
    chatArea.appendChild(row);
    scrollChat();
    return row;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-row ai';
    wrap.id = 'typingEl';
    wrap.innerHTML = `<div class="typing-wrap"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
    chatArea.appendChild(wrap);
    scrollChat();
  }

  function removeTyping() {
    document.getElementById('typingEl')?.remove();
  }

  function setLoading(on) {
    btnSend.disabled = on;
    msgInput.disabled = on;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || btnSend.disabled) return;

    // 隐藏欢迎页
    const wp = document.getElementById('welcomePage');
    if (wp) wp.style.display = 'none';

    addBubble('user', text, formatTime());
    sessionMsgs.push({ role: 'user', content: text });
    msgInput.value = '';
    setLoading(true);

    showTyping();

    try {
      const useStream = false; // 后端返回普通JSON，暂不支持SSE流式

      if (useStream) {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: sessionMsgs, stream: true })
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addBubble('ai', `❌ 请求失败：${err.reply || err.error || res.status}`, formatTime());
          setLoading(false);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';

        const aiRow = addBubble('ai', '', formatTime());
        const bubble = aiRow.querySelector('.msg-bubble');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          for (const line of chunk.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              const content = parsed.choices?.[0]?.delta?.content || '';
              if (content) {
                full += content;
                bubble.textContent = full;
                scrollChat();
              }
            } catch {}
          }
        }

        sessionMsgs.push({ role: 'assistant', content: full });

      } else {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: sessionMsgs, stream: false })
        });

        removeTyping();

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          addBubble('ai', `❌ 请求失败：${err.reply || err.error || res.status}`, formatTime());
          setLoading(false);
          return;
        }

        const data = await res.json();
        const reply = data.reply || 'AI未返回有效内容';
        addBubble('ai', reply, formatTime());
        sessionMsgs.push({ role: 'assistant', content: reply });
      }

      document.getElementById('connStatus').textContent = '已连接';

    } catch (e) {
      removeTyping();
      addBubble('ai', `❌ 网络错误：${e.message}`, formatTime());
      document.getElementById('connStatus').textContent = '离线';
    }

    setLoading(false);
  }

  btnSend.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── 快速入口 ──────────────────────────────────────────────
  document.querySelectorAll('.qp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const msg = btn.getAttribute('data-msg');
      msgInput.value = msg;
      sendMessage();
    });
  });

  // ── 离开提示 ──────────────────────────────────────────────
  window.addEventListener('beforeunload', e => {
    if (sessionMsgs.length > 0) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // 头像动画已移除（顶栏改用 SVG）
  // loopSpheres();

})();
</script>
