<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        
        .error-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 8em;
            margin: 0;
            color: white;
            text-shadow: 3px 3px 0 rgba(0, 0, 0, 0.2);
        }
        
        h2 {
            font-size: 2em;
            margin: 20px 0;
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .search-box {
            margin-top: 30px;
        }
        
        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            width: 300px;
            font-size: 1em;
            margin-right: 10px;
        }
        
        .search-box button {
            padding: 12px 25px;
            background: #8b5cf6;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }
        
        @media (max-width: 600px) {
            .error-container {
                padding: 30px;
            }
            
            h1 {
                font-size: 5em;
            }
            
            .search-box input {
                width: 100%;
                margin-bottom: 10px;
            }
            
            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>哎呀！页面走丢了</h2>
        <p>您访问的页面可能已被移动、删除或暂时不可用。</p>
        
        <div class="buttons">
            <a href="/" class="btn">返回首页</a>
            <a href="/test.html" class="btn">测试页面</a>
            <a href="javascript:history.back()" class="btn">返回上一页</a>
        </div>
        
        <div class="search-box">
            <p style="margin-top: 30px; margin-bottom: 15px;">或者搜索您需要的内容：</p>
            <input type="text" id="searchInput" placeholder="输入关键词搜索...">
            <button onclick="searchSite()">搜索</button>
        </div>
    </div>
    
    <script>
        function searchSite() {
            const query = document.getElementById('searchInput').value;
            if (query.trim()) {
                // 在实际网站中，这里应该跳转到搜索页面
                alert('搜索功能: ' + query + '\n\n在实际网站中，这里会跳转到搜索结果页面。');
            }
        }
        
        // 回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSite();
            }
        });
        
        // 页面加载动画
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
