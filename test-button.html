<!DOCTYPE html>
<html>
<head>
    <title>按钮测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 20px; border: 2px solid #ddd; border-radius: 10px; }
        .pass { border-color: #10b981; background: #d4edda; }
        .fail { border-color: #dc3545; background: #f8d7da; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; }
    </style>
</head>
<body>
    <h1>按钮功能测试</h1>
    
    <div class="test">
        <h2>测试1: "开始装机"按钮</h2>
        <button id="startBuildingBtn" style="background: #3b82f6; color: white; border: none; border-radius: 8px;">
            <i class="fas fa-rocket"></i> 开始装机
        </button>
        <p id="test1-result">点击按钮测试...</p>
    </div>
    
    <div class="test">
        <h2>测试2: 硬件选择器</h2>
        <div id="hardwareList" style="min-height: 200px; border: 1px dashed #ccc; padding: 20px;">
            硬件列表将在这里显示...
        </div>
        <div style="margin-top: 20px;">
            <button class="tab-btn" data-category="cpu">CPU处理器</button>
            <button class="tab-btn" data-category="gpu">显卡</button>
            <button class="tab-btn" data-category="motherboard">主板</button>
        </div>
        <p id="test2-result">点击标签测试...</p>
    </div>
    
    <div class="test">
        <h2>测试3: 控制台输出</h2>
        <p>打开浏览器控制台(F12 → Console)查看详细日志</p>
        <div id="console-output" style="background: #f8f9fa; padding: 10px; border-radius: 5px; font-family: monospace; height: 100px; overflow-y: auto;"></div>
    </div>
    
    <script>
        // 重写console.log以在页面上显示
        const originalLog = console.log;
        const consoleOutput = document.getElementById('console-output');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            const message = args.map(arg => 
                typeof arg === 'object' ? JSON.stringify(arg) : arg
            ).join(' ');
            
            const line = document.createElement('div');
            line.textContent = `> ${message}`;
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        console.warn = function(...args) {
            originalLog.apply(console, ['⚠️', ...args]);
            const message = args.join(' ');
            const line = document.createElement('div');
            line.textContent = `⚠️ ${message}`;
            line.style.color = '#f59e0b';
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
        
        console.error = function(...args) {
            originalLog.apply(console, ['❌', ...args]);
            const message = args.join(' ');
            const line = document.createElement('div');
            line.textContent = `❌ ${message}`;
            line.style.color = '#dc3545';
            consoleOutput.appendChild(line);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };
    </script>
    
    <!-- 加载修复脚本 -->
    <script src="fix-start-button.js"></script>
    <script src="fix-start-button-complete.js"></script>
    
    <script>
        // 手动触发测试
        setTimeout(() => {
            const startButton = document.getElementById('startBuildingBtn');
            const test1Result = document.getElementById('test1-result');
            
            if (startButton) {
                test1Result.textContent = '✅ 按钮已找到，等待点击测试...';
                test1Result.style.color = '#198754';
                
                // 模拟点击
                setTimeout(() => {
                    console.log('🧪 模拟点击"开始装机"按钮');
                    startButton.click();
                    
                    setTimeout(() => {
                        test1Result.innerHTML = '✅ 按钮点击测试完成<br>查看控制台输出确认功能';
                        test1Result.parentElement.className = 'test pass';
                    }, 500);
                }, 1000);
            } else {
                test1Result.textContent = '❌ 按钮未找到';
                test1Result.style.color = '#dc3545';
                test1Result.parentElement.className = 'test fail';
            }
            
            // 测试硬件选择器
            setTimeout(() => {
                const hardwareList = document.getElementById('hardwareList');
                const test2Result = document.getElementById('test2-result');
                
                if (hardwareList && hardwareList.children.length > 0) {
                    test2Result.innerHTML = `✅ 硬件列表已加载: ${hardwareList.children.length} 个项目`;
                    test2Result.style.color = '#198754';
                    test2Result.parentElement.className = 'test pass';
                } else {
                    test2Result.textContent = '❌ 硬件列表未加载';
                    test2Result.style.color = '#dc3545';
                    test2Result.parentElement.className = 'test fail';
                }
            }, 2000);
        }, 500);
    </script>
</body>
</html>
